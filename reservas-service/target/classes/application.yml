server:
  port: 8082

spring:
  application:
    name: reservas-service

  datasource:
    url: jdbc:postgresql://postgres:5432/tutorias_reservas
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # RabbitMQ
  rabbitmq:
    host: rabbitmq-tutorias
    port: 5672
    username: admin
    password: admin

# Eureka
eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
    fetch-registry: false
    register-with-eureka: true
  instance:
    prefer-ip-address: true

# URLs directas a los otros microservicios
servicios:
  usuarios-url: http://usuarios-service:8000
  catalogo-url: http://catalogo-service:3000

# Swagger / OpenAPI
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

logging:
  level:
    com.tutorias: DEBUG
    org.springframework.amqp: INFO
